<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LIFE QUEST</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#4f6ef7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LIFE QUEST" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      height: 100%;
      background: #f0ede8;
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    }
    /* スプラッシュ */
    #splash {
      position: fixed; inset: 0;
      background: #f0ede8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-icon {
      width: 96px; height: 96px;
      background: #4f6ef7;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px #4f6ef740;
    }
    #splash h1 {
      font-size: 28px; font-weight: 900;
      letter-spacing: 6px; color: #1e1b2e;
    }
    #splash p {
      margin-top: 8px; font-size: 12px;
      color: #78716c; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <!-- スプラッシュ画面 -->
  <div id="splash">
    <div id="splash-icon">⚔️</div>
    <h1>LIFE QUEST</h1>
    <p>現実をRPGに変えよう</p>
  </div>

  <div id="root"></div>

  <!-- React + Babel (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- アプリ本体（JSX）を外部ファイルから読み込み -->
  <script type="text/babel" src="/app.jsx" data-presets="react"></script>

  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW error', e));
      });
    }

    // スプラッシュを非表示（アプリ描画後）
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 500);
        }
      }, 800);
    });
  </script>
</body>
</html>
